<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health-Me</title>    
    <link rel="stylesheet" href="responsivo.css">
</head>

<body>
    <header class="cab">
        <div class="box-cab">
            <div class="box-pesT">
                <h1>Health-ME</h1>
                <div class="pesquisa"><input type="search" placeholder="Pesquisar..."><button><img src="img/lupa.png"
                            alt="Lupa"></button></div>
            </div>

            <div class="logo"><img src="img/logo.png" alt="Logo Health-ME"></div>

        </div>
    </header>
    <section class="container">
        <div class="box">
            <div class="img-box"><img src="img/remedio1.jpg" alt="remedio1"></div>
            <div class="box-info">
                <h2 id="rem1">Loratadina</h2>
                <ul class="tags">
                    <li>R$15,00</li>
                </ul>
            </div>
            <div class="box-btn"><button class="btn">Saber mais</button></div>
        </div>
        <div class="box">
            <div class="img-box"><img src="img/remedio2.png" alt="remedio2"></div>
            <div class="box-info">
                <h2 id="rem2">Remédio 2</h2>
                <ul class="tags">
                    <li>R$12,50</li>
                </ul>
            </div>
            <div class="box-btn"><button class="btn">Saber mais</button></div>
        </div>
        <div class="box">
            <button class="plus-btn"><img src="img/plus.png" class="plus-img" alt="Adicionar remedio"></button>
            <p class="info">Adicione um remedio...</p>
        </div>
    </section>
    <footer class="rod">
        <div class="box-rod">
            <p>Health-ME - Todos os direitos reservados</p>
        </div>
    </footer>
</body>
<script src="script.js"></script>

</html>
